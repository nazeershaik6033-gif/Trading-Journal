  <script>
    // localStorage shim
    window.storage = {
      get: async (key) => {
        try {
          const val = localStorage.getItem(key);
          return val !== null ? { key, value: val } : null;
        } catch { return null; }
      },
      set: async (key, value) => {
        try { localStorage.setItem(key, value); return { key, value }; }
        catch (e) { console.error('Storage write failed', e); return null; }
      },
      delete: async (key) => {
        try { localStorage.removeItem(key); return { key, deleted: true }; }
        catch { return null; }
      },
      list: async (prefix = '') => {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (!prefix || k.startsWith(prefix)) keys.push(k);
        }
        return { keys, prefix };
      }
    };

    // Surface fatal errors on the boot screen
    window.showBootError = function(title, detail) {
      const el = document.getElementById('boot-error');
      const msg = document.getElementById('boot-error-msg');
      const det = document.getElementById('boot-error-detail');
      if (msg) msg.textContent = title;
      if (det) det.textContent = detail || '';
      if (el) el.style.display = 'block';
    };

    window.addEventListener('error', (e) => {
      console.error('Window error:', e.error || e.message);
      window.showBootError('JavaScript error', (e.error && (e.error.stack || e.error.message)) || e.message || 'Unknown error');
    });
    window.addEventListener('unhandledrejection', (e) => {
      console.error('Promise rejection:', e.reason);
      window.showBootError('Promise error', (e.reason && (e.reason.stack || e.reason.message)) || String(e.reason));
    });

    // Diagnostic timeout
    setTimeout(() => {
      const root = document.getElementById('root');
      if (root && root.children.length === 0) {
        const checks = [];
        checks.push('React: ' + (typeof React !== 'undefined' ? 'OK ' + React.version : 'MISSING'));
        checks.push('ReactDOM: ' + (typeof ReactDOM !== 'undefined' ? 'OK' : 'MISSING'));
        checks.push('Recharts: ' + (typeof Recharts !== 'undefined' ? 'OK' : 'MISSING'));
        checks.push('Babel: ' + (typeof Babel !== 'undefined' ? 'OK' : 'MISSING'));
        window.showBootError('App did not start within 12 seconds', checks.join('\n'));
      }
    }, 12000);

    // Hide boot screen once React mounts
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        document.getElementById('boot')?.classList.add('hidden');
        setTimeout(() => document.getElementById('boot')?.remove(), 500);
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true, subtree: true });
  </script>

const fmt = (n, dp = 2) => {
  if (n === null || n === undefined || isNaN(n)) return '0.00';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: dp, maximumFractionDigits: dp });
};

  const sign = n < 0 ? '-' : '';
  return `${sign}${currency}${fmt(Math.abs(n || 0), dp)}`;
};

// Compute trade analytics
const computeTrade = (trade) => {
  const entries = trade.entries || [];
  const exits = trade.exits || [];
  const totalEntryQty = entries.reduce((s, e) => s + (Number(e.quantity) || 0), 0);
  const totalExitQty = exits.reduce((s, e) => s + (Number(e.quantity) || 0), 0);
  const entryValue = entries.reduce((s, e) => s + (Number(e.price) || 0) * (Number(e.quantity) || 0), 0);
  const exitValue = exits.reduce((s, e) => s + (Number(e.price) || 0) * (Number(e.quantity) || 0), 0);
  const avgEntry = totalEntryQty > 0 ? entryValue / totalEntryQty : 0;
  const avgExit = totalExitQty > 0 ? exitValue / totalExitQty : 0;
  const closedQty = Math.min(totalEntryQty, totalExitQty);
  const isClosed = trade.status === 'Closed' || (totalEntryQty > 0 && totalExitQty >= totalEntryQty);
  const dir = trade.side === 'Short' ? -1 : 1;
  const realizedPnL = closedQty > 0 ? (avgExit - avgEntry) * closedQty * dir : 0;
  const realizedPnLPct = avgEntry > 0 && closedQty > 0 ? ((avgExit - avgEntry) / avgEntry) * 100 * dir : 0;
  const openQty = totalEntryQty - totalExitQty;
  const investedAmount = openQty > 0 ? avgEntry * openQty : 0;
  return {
    totalEntryQty, totalExitQty, avgEntry, avgExit, closedQty, isClosed,
    realizedPnL, realizedPnLPct, openQty, investedAmount,
    entryValue: avgEntry * totalEntryQty
  };
};

// Position size calculator
const calcPosition = ({ capital, riskPercent, entryPrice, stopLossPrice, side = 'Long', target }) => {
  const c = Number(capital), r = Number(riskPercent), e = Number(entryPrice), s = Number(stopLossPrice);
  if (!c || !r || !e || !s) return null;
  const riskAmount = c * (r / 100);
  const priceDiff = side === 'Long' ? e - s : s - e;
  if (priceDiff <= 0) return { error: side === 'Long' ? 'Stop loss must be below entry' : 'Stop loss must be above entry' };
  const quantity = riskAmount / priceDiff;
  const positionValue = e * quantity;
  const slPct = (priceDiff / e) * 100;
  const allocPct = (positionValue / c) * 100;
  let rr = null;
  if (target) {
    const tDiff = side === 'Long' ? Number(target) - e : e - Number(target);
    if (tDiff > 0) rr = tDiff / priceDiff;
  }
  return { quantity, riskAmount, positionValue, slPct, allocPct, rr };
};

// ===== Storage hook =====
const useStorage = () => {
  const [data, setData] = useState({ settings: DEFAULT_SETTINGS, trades: [], strategies: [], watchlist: [] });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      const out = { settings: DEFAULT_SETTINGS, trades: [], strategies: [], watchlist: [] };
      const get = async (k, fb) => {
        try { const r = await window.storage.get(k); return r?.value ? JSON.parse(r.value) : fb; }
        catch { return fb; }
      };
      out.settings = await get('settings', DEFAULT_SETTINGS);
      out.trades = await get('trades', []);
      out.strategies = await get('strategies', []);
      out.watchlist = await get('watchlist', []);
      setData(out);
      setLoaded(true);
    })();
  }, []);

  const persist = async (key, value) => {
    try { await window.storage.set(key, JSON.stringify(value)); } catch (e) { console.error(e); }
  };

  const update = (key, value) => {
    setData(prev => {
      const next = { ...prev, [key]: value };
      persist(key, value);
      return next;
    });
  };

  const replaceAll = (newData) => {
    const merged = {
      settings: newData.settings || DEFAULT_SETTINGS,
      trades: newData.trades || [],
      strategies: newData.strategies || [],
      watchlist: newData.watchlist || []
    };
    setData(merged);
    persist('settings', merged.settings);
    persist('trades', merged.trades);
    persist('strategies', merged.strategies);
    persist('watchlist', merged.watchlist);
  };

  return { ...data, loaded, update, replaceAll };
};

const Btn = ({ variant = 'primary', children, onClick, type, disabled, className = '' }) => {
  const variants = {
    primary: 'bg-amber-200 text-stone-900 hover:bg-amber-100 disabled:bg-stone-700 disabled:text-stone-500',
    secondary: 'bg-stone-800 text-stone-200 hover:bg-stone-700 border border-stone-700',
    ghost: 'text-stone-400 hover:text-stone-200',
    danger: 'bg-rose-500/20 text-rose-300 hover:bg-rose-500/30 border border-rose-500/30'
  };
  return (
    <button type={type || 'button'} onClick={onClick} disabled={disabled}
      className={`px-4 py-2.5 rounded-lg text-sm font-medium tracking-wide transition-all disabled:cursor-not-allowed ${variants[variant]} ${className}`}>
      {children}
    </button>
  );
};

const TagSelector = ({ value = [], onChange, options }) => {
  const toggle = (t) => onChange(value.includes(t) ? value.filter(v => v !== t) : [...value, t]);
  return (
    <div className="flex flex-wrap gap-1.5">
      {options.map(o => (
        <button key={o} type="button" onClick={() => toggle(o)}
          className={`px-2.5 py-1 text-xs rounded-md border transition-colors ${value.includes(o) ? 'bg-amber-200/10 text-amber-200 border-amber-200/40' : 'border-stone-700 text-stone-500 hover:text-stone-300 hover:border-stone-600'}`}>
          {o}
        </button>
      ))}
    </div>
  );
};

  const set = (k, v) => setT(p => ({ ...p, [k]: v }));
  const setEntry = (i, k, v) => setT(p => ({ ...p, entries: p.entries.map((e, j) => j === i ? { ...e, [k]: v } : e) }));

  const addEntry = () => setT(p => ({ ...p, entries: [...p.entries, { id: uid(), price: '', quantity: '', date: todayISO(), notes: '' }] }));
  const addExit = () => setT(p => ({ ...p, exits: [...p.exits, { id: uid(), price: '', quantity: '', date: todayISO(), notes: '' }] }));

      {/* Levels */}

        <h4 className="font-display text-sm uppercase tracking-[0.2em] text-amber-200/80">Levels</h4>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Stop Loss"><Input type="number" step="any" value={t.stopLoss} onChange={e => set('stopLoss', e.target.value)} /></Field>
          <Field label="Target"><Input type="number" step="any" value={t.target} onChange={e => set('target', e.target.value)} /></Field>
        </div>
      </section>

      {/* Reflection */}
      <section className="space-y-4">
        <h4 className="font-display text-sm uppercase tracking-[0.2em] text-amber-200/80">Reflection</h4>
        <Field label="Emotions during trade"><TagSelector value={t.emotions} onChange={v => set('emotions', v)} options={EMOTION_TAGS} /></Field>
        <Field label="Entry mistakes"><TagSelector value={t.entryMistakes} onChange={v => set('entryMistakes', v)} options={ENTRY_MISTAKES} /></Field>
        <Field label="Exit mistakes"><TagSelector value={t.exitMistakes} onChange={v => set('exitMistakes', v)} options={EXIT_MISTAKES} /></Field>
        <Field label="General mistakes"><TagSelector value={t.generalMistakes} onChange={v => set('generalMistakes', v)} options={GENERAL_MISTAKES} /></Field>
        <Field label="Notes"><Textarea value={t.notes} onChange={e => set('notes', e.target.value)} rows={3} placeholder="Lessons, context, market conditions…" /></Field>
      </section>

      {/* Delete (only in edit mode) */}
      {initial && (
        <section className="pt-4 border-t border-stone-800">
          <Btn variant="danger" onClick={() => {
            if (confirm('Delete this trade? This cannot be undone.')) {

              onClose();

// ===== Dashboard View =====
const Dashboard = ({ trades, settings, strategies, onAddTrade, onOpenSettings }) => {
  const stats = useMemo(() => {
    const computed = trades.map(t => ({ ...t, _c: computeTrade(t) }));
    const closed = computed.filter(t => t._c.isClosed);
    const open = computed.filter(t => !t._c.isClosed);
    const wins = closed.filter(t => t._c.realizedPnL > 0);
    const losses = closed.filter(t => t._c.realizedPnL < 0);
    const totalPnL = closed.reduce((s, t) => s + t._c.realizedPnL, 0);
    const invested = open.reduce((s, t) => s + t._c.investedAmount, 0);
    const winRate = closed.length > 0 ? (wins.length / closed.length) * 100 : 0;
    const avgWin = wins.length > 0 ? wins.reduce((s, t) => s + t._c.realizedPnL, 0) / wins.length : 0;
    const avgLoss = losses.length > 0 ? losses.reduce((s, t) => s + t._c.realizedPnL, 0) / losses.length : 0;
    return { computed, closed, open, wins, losses, totalPnL, invested, winRate, avgWin, avgLoss };
  }, [trades]);

  const cumulativeData = useMemo(() => {
    const sorted = [...stats.closed].sort((a, b) => {
      const ad = a.exits[a.exits.length - 1]?.date || a.createdAt || 0;
      const bd = b.exits[b.exits.length - 1]?.date || b.createdAt || 0;
      return new Date(ad) - new Date(bd);
    });
    let cum = 0;
    return sorted.map((t, i) => {
      cum += t._c.realizedPnL;
      return { idx: i + 1, pnl: cum, label: t.symbol };
    });
  }, [stats.closed]);

  const recent = [...trades].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)).slice(0, 4);
  const available = settings.capital - stats.invested;

  return (
    <div className="space-y-5 pb-32">
      {/* Capital Hero */}
      <div className="relative overflow-hidden bg-gradient-to-br from-stone-900 via-stone-900 to-stone-950 border border-stone-800 rounded-2xl p-6">
        <div className="absolute -top-12 -right-12 w-48 h-48 bg-amber-300/5 rounded-full blur-3xl" />
        <div className="relative">
          <div className="flex items-center justify-between mb-1">
            <p className="text-[11px] uppercase tracking-[0.2em] text-stone-500">Total Capital</p>
            <button onClick={onOpenSettings} className="text-stone-500 hover:text-amber-200 text-xs">Edit</button>
          </div>
          <p className="font-display text-4xl text-stone-100 tracking-tight">{settings.currency}{fmt(settings.capital, 0)}</p>
          <div className="grid grid-cols-2 gap-4 mt-5 pt-5 border-t border-stone-800">
            <div>
              <p className="text-[10px] uppercase tracking-[0.15em] text-stone-500">Invested</p>
              <p className="font-mono text-lg text-stone-200 mt-0.5">{fmtMoney(stats.invested, settings.currency)}</p>
            </div>
            <div>
              <p className="text-[10px] uppercase tracking-[0.15em] text-stone-500">Available</p>
              <p className="font-mono text-lg text-amber-200 mt-0.5">{fmtMoney(available, settings.currency)}</p>
            </div>
          </div>
        </div>
      </div>

      {/* P&L cards */}
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-4">
          <div className="flex items-center gap-1.5 text-[10px] uppercase tracking-[0.15em] text-stone-500">
            {stats.totalPnL >= 0 ? <TrendingUp size={12} className="text-emerald-400" /> : <TrendingDown size={12} className="text-rose-400" />}
            Realized P&L
          </div>
          <p className={`font-mono text-2xl mt-1 ${stats.totalPnL >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
            {stats.totalPnL >= 0 ? '+' : ''}{fmtMoney(stats.totalPnL, settings.currency)}
          </p>
        </div>
        <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-4">
          <p className="text-[10px] uppercase tracking-[0.15em] text-stone-500">Win Rate</p>
          <p className="font-mono text-2xl mt-1 text-stone-100">{fmt(stats.winRate, 1)}%</p>
          <p className="text-[10px] text-stone-500 mt-0.5">{stats.wins.length}W / {stats.losses.length}L</p>
        </div>
      </div>

      {/* Curve */}
      {cumulativeData.length > 1 && (
        <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-4">
          <p className="text-[11px] uppercase tracking-[0.2em] text-stone-500 mb-3">Equity Curve</p>
          <ResponsiveContainer width="100%" height={140}>
            <LineChart data={cumulativeData}>
              <CartesianGrid strokeDasharray="2 4" stroke="#292524" vertical={false} />
              <XAxis dataKey="idx" hide />
              <YAxis hide />
              <Tooltip
                contentStyle={{ background: '#0c0a09', border: '1px solid #292524', borderRadius: 8, fontSize: 12 }}
                formatter={(v) => fmtMoney(v, settings.currency)}
                labelFormatter={(l, p) => p[0]?.payload?.label || ''}
              />
              <ReferenceLine y={0} stroke="#44403c" strokeDasharray="3 3" />
              <Line type="monotone" dataKey="pnl" stroke="#fcd34d" strokeWidth={2} dot={false} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      )}

      {/* Quick stats grid */}
      <div className="grid grid-cols-3 gap-3">
        <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-3">
          <p className="text-[10px] uppercase tracking-wider text-stone-500">Open</p>
          <p className="font-display text-2xl text-stone-100 mt-0.5">{stats.open.length}</p>
        </div>
        <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-3">
          <p className="text-[10px] uppercase tracking-wider text-stone-500">Closed</p>
          <p className="font-display text-2xl text-stone-100 mt-0.5">{stats.closed.length}</p>
        </div>
        <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-3">
          <p className="text-[10px] uppercase tracking-wider text-stone-500">Avg R:R</p>
          <p className="font-display text-2xl text-stone-100 mt-0.5">
            {stats.avgLoss < 0 ? fmt(Math.abs(stats.avgWin / stats.avgLoss), 2) : '—'}
          </p>
        </div>
      </div>

      {/* Recent */}
      <div>
        <div className="flex items-center justify-between mb-3 px-1">
          <p className="text-[11px] uppercase tracking-[0.2em] text-stone-500">Recent Activity</p>
        </div>
        <div className="space-y-2">
          {recent.length === 0 && (
            <div className="bg-stone-900/40 border border-dashed border-stone-800 rounded-xl p-8 text-center">
              <Sparkles className="w-6 h-6 text-stone-600 mx-auto mb-2" />
              <p className="text-stone-500 text-sm">No trades yet</p>
              <button onClick={onAddTrade} className="text-amber-200 text-sm mt-2">Record your first trade →</button>
            </div>
          )}
          {recent.map(t => {
            const c = computeTrade(t);
            return (
              <div key={t.id} className="bg-stone-900/40 border border-stone-800 rounded-xl p-3 flex items-center justify-between">
                <div>
                  <div className="flex items-center gap-2">
                    <span className={`text-[10px] px-1.5 py-0.5 rounded ${t.side === 'Long' ? 'bg-emerald-500/15 text-emerald-300' : 'bg-rose-500/15 text-rose-300'}`}>{t.side}</span>
                    <span className="font-display text-base text-stone-100">{t.symbol}</span>
                    <span className="text-[10px] text-stone-500">{t.tradeType}</span>
                  </div>
                  <p className="text-[11px] text-stone-500 font-mono mt-0.5">
                    {fmt(c.totalEntryQty, 2)} @ {fmt(c.avgEntry)}
                  </p>
                </div>
                <div className="text-right">
                  {c.isClosed ? (
                    <p className={`font-mono text-sm ${c.realizedPnL >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                      {c.realizedPnL >= 0 ? '+' : ''}{fmtMoney(c.realizedPnL, settings.currency)}
                    </p>
                  ) : (
                    <span className="text-[10px] text-amber-300 px-1.5 py-0.5 bg-amber-300/10 rounded">OPEN</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ===== Calendar View (subview of Trades) =====
const CalendarView = ({ trades, settings, onEdit }) => {
  const [cursor, setCursor] = useState(() => {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1);
  });
  const [selectedDay, setSelectedDay] = useState(null);

  const tradesByDay = useMemo(() => {
    const map = {};
    trades.forEach(t => {
      const c = computeTrade(t);
      if (c.isClosed && t.exits && t.exits.length > 0) {
        const exitDate = t.exits[t.exits.length - 1].date;
        if (exitDate) {
          const dayKey = exitDate.slice(0, 10);
          if (!map[dayKey]) map[dayKey] = { pnl: 0, count: 0, trades: [] };
          map[dayKey].pnl += c.realizedPnL;
          map[dayKey].count += 1;
          map[dayKey].trades.push({ ...t, _c: c });
        }
      } else if (!c.isClosed && t.entries && t.entries.length > 0) {
        // Open trades shown on entry date with neutral marker
        const entryDate = t.entries[0].date;
        if (entryDate) {
          const dayKey = entryDate.slice(0, 10);
          if (!map[dayKey]) map[dayKey] = { pnl: 0, count: 0, trades: [], hasOpen: false };
          map[dayKey].count += 1;
          map[dayKey].hasOpen = true;
          map[dayKey].trades.push({ ...t, _c: c });
        }
      }
    });
    return map;
  }, [trades]);

  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthLabel = cursor.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  // Monthly aggregate
  const monthStats = useMemo(() => {
    let pnl = 0, count = 0, wins = 0;
    Object.entries(tradesByDay).forEach(([k, v]) => {
      if (k.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`)) {
        pnl += v.pnl;
        count += v.count;
        v.trades.forEach(t => { if (t._c.isClosed && t._c.realizedPnL > 0) wins += 1; });
      }
    });
    return { pnl, count, wins };
  }, [tradesByDay, year, month]);

  const prevMonth = () => setCursor(new Date(year, month - 1, 1));
  const nextMonth = () => setCursor(new Date(year, month + 1, 1));

  const dayKey = (d) => `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  const selectedData = selectedDay ? tradesByDay[selectedDay] : null;

  return (
    <div className="space-y-4">
      {/* Month nav */}
      <div className="flex items-center justify-between bg-stone-900/40 border border-stone-800 rounded-xl p-3">
        <button onClick={prevMonth} className="p-2 -m-2 text-stone-400 hover:text-stone-100"><ChevronLeft size={18} /></button>
        <div className="text-center">
          <p className="font-display text-base text-stone-100">{monthLabel}</p>
          <p className="text-[10px] uppercase tracking-wider text-stone-500 mt-0.5">
            {monthStats.count} trade{monthStats.count !== 1 ? 's' : ''}
            {monthStats.count > 0 && (
              <span className={`ml-2 font-mono ${monthStats.pnl >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                {monthStats.pnl >= 0 ? '+' : ''}{fmtMoney(monthStats.pnl, settings.currency)}
              </span>
            )}
          </p>
        </div>
        <button onClick={nextMonth} className="p-2 -m-2 text-stone-400 hover:text-stone-100"><ChevronRight size={18} /></button>
      </div>

      {/* Day labels */}
      <div className="grid grid-cols-7 gap-1 px-1">
        {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d, i) => (
          <div key={i} className="text-center text-[10px] uppercase tracking-wider text-stone-600 py-1">{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div className="grid grid-cols-7 gap-1">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const k = dayKey(d);
          const data = tradesByDay[k];
          const isToday = k === todayKey;
          const isSelected = selectedDay === k;
          const tone = data
            ? (data.pnl > 0 ? 'profit' : data.pnl < 0 ? 'loss' : 'neutral')
            : null;

          return (
            <button
              key={i}
              onClick={() => setSelectedDay(isSelected ? null : (data ? k : null))}
              disabled={!data && !isToday}
              className={`
                aspect-square rounded-lg flex flex-col items-center justify-center text-xs relative transition-all
                ${isSelected ? 'ring-2 ring-amber-200' : ''}
                ${tone === 'profit' ? 'bg-emerald-500/15 text-emerald-200 hover:bg-emerald-500/25' : ''}
                ${tone === 'loss' ? 'bg-rose-500/15 text-rose-200 hover:bg-rose-500/25' : ''}
                ${tone === 'neutral' ? 'bg-amber-300/10 text-amber-200 hover:bg-amber-300/20' : ''}
                ${!data && !isToday ? 'text-stone-700' : ''}
                ${!data && isToday ? 'text-amber-200 border border-amber-200/40' : ''}
              `}
            >
              <span className={`font-mono ${data ? 'font-semibold' : ''}`}>{d}</span>
              {data && data.pnl !== 0 && (
                <span className={`text-[8px] font-mono leading-none mt-0.5 ${data.pnl >= 0 ? 'text-emerald-300' : 'text-rose-300'}`}>
                  {data.pnl >= 0 ? '+' : '-'}{fmt(Math.abs(data.pnl) >= 1000 ? Math.abs(data.pnl) / 1000 : Math.abs(data.pnl), Math.abs(data.pnl) >= 1000 ? 1 : 0)}{Math.abs(data.pnl) >= 1000 ? 'k' : ''}
                </span>
              )}
              {data && data.hasOpen && data.pnl === 0 && (
                <span className="text-[8px] text-amber-300 leading-none mt-0.5">●</span>
              )}
            </button>
          );
        })}
      </div>

      {/* Legend */}
      <div className="flex items-center justify-center gap-3 text-[10px] text-stone-500 uppercase tracking-wider">
        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-emerald-500/40" />Profit</span>
        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-rose-500/40" />Loss</span>
        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-amber-300/30" />Open</span>
      </div>

      {/* Selected day detail */}
      {selectedData && (
        <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-4 space-y-3">
          <div className="flex items-center justify-between">
            <p className="text-[11px] uppercase tracking-[0.2em] text-stone-500">
              {new Date(selectedDay + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
            </p>
            <button onClick={() => setSelectedDay(null)} className="text-stone-500 hover:text-stone-200"><X size={16} /></button>
          </div>
          <div className="flex items-center gap-3 pb-3 border-b border-stone-800">
            <div>
              <p className="text-[10px] uppercase tracking-wider text-stone-500">Trades</p>
              <p className="font-display text-xl text-stone-100">{selectedData.count}</p>
            </div>
            <div>
              <p className="text-[10px] uppercase tracking-wider text-stone-500">Net P&L</p>
              <p className={`font-mono text-lg ${selectedData.pnl >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                {selectedData.pnl >= 0 ? '+' : ''}{fmtMoney(selectedData.pnl, settings.currency)}
              </p>
            </div>
          </div>
          <div className="space-y-2">
            {selectedData.trades.map(t => (
              <button key={t.id} onClick={() => onEdit(t)} className="w-full text-left bg-stone-900/60 hover:bg-stone-900 rounded-lg p-3 flex items-center justify-between transition-colors">
                <div className="flex items-center gap-2">
                  <span className={`text-[10px] px-1.5 py-0.5 rounded ${t.side === 'Long' ? 'bg-emerald-500/15 text-emerald-300' : 'bg-rose-500/15 text-rose-300'}`}>{t.side}</span>
                  <span className="font-display text-sm text-stone-100">{t.symbol}</span>
                </div>
                {t._c.isClosed ? (
                  <span className={`font-mono text-sm ${t._c.realizedPnL >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {t._c.realizedPnL >= 0 ? '+' : ''}{fmtMoney(t._c.realizedPnL, settings.currency)}
                  </span>
                ) : (
                  <span className="text-[10px] text-amber-300">OPEN</span>
                )}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ===== Trades View =====
const TradesView = ({ trades, strategies, settings, onEdit, onAddTrade }) => {
  const [view, setView] = useState('list'); // 'list' | 'calendar'
  const [statusFilter, setStatusFilter] = useState('All');
  const [sideFilter, setSideFilter] = useState('All');
  const [resultFilter, setResultFilter] = useState('All');
  const [instrFilter, setInstrFilter] = useState('All');
  const [typeFilter, setTypeFilter] = useState('All');
  const [stratFilter, setStratFilter] = useState('All');
  const [search, setSearch] = useState('');
  const [showFilters, setShowFilters] = useState(false);

  const filtered = useMemo(() => {
    return trades.map(t => ({ ...t, _c: computeTrade(t) })).filter(t => {
      if (search && !t.symbol.toLowerCase().includes(search.toLowerCase())) return false;
      if (statusFilter === 'Open' && t._c.isClosed) return false;
      if (statusFilter === 'Closed' && !t._c.isClosed) return false;
      if (sideFilter !== 'All' && t.side !== sideFilter) return false;
      if (resultFilter === 'Profit' && !(t._c.isClosed && t._c.realizedPnL > 0)) return false;
      if (resultFilter === 'Loss' && !(t._c.isClosed && t._c.realizedPnL < 0)) return false;
      if (instrFilter !== 'All' && t.instrumentType !== instrFilter) return false;
      if (typeFilter !== 'All' && t.tradeType !== typeFilter) return false;
      if (stratFilter !== 'All' && t.strategyId !== stratFilter) return false;
      return true;
    }).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  }, [trades, statusFilter, sideFilter, resultFilter, instrFilter, typeFilter, stratFilter, search]);

  return (
    <div className="space-y-4 pb-32">
      {/* View toggle */}
      <div className="grid grid-cols-2 gap-1 bg-stone-900/40 border border-stone-800 rounded-lg p-1">
        <button onClick={() => setView('list')} type="button"
          className={`py-2 rounded text-sm font-medium transition-colors flex items-center justify-center gap-1.5 ${view === 'list' ? 'bg-amber-200 text-stone-900' : 'text-stone-400'}`}>
          <BookOpen size={14} />List
        </button>
        <button onClick={() => setView('calendar')} type="button"
          className={`py-2 rounded text-sm font-medium transition-colors flex items-center justify-center gap-1.5 ${view === 'calendar' ? 'bg-amber-200 text-stone-900' : 'text-stone-400'}`}>
          <Calendar size={14} />Calendar
        </button>
      </div>

      {view === 'calendar' && (
        <CalendarView trades={trades} settings={settings} onEdit={onEdit} />
      )}

      {view === 'list' && (
      <>
      <div className="flex items-center gap-2">
        <div className="flex-1 relative">
          <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500" />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search symbol…"
            className="w-full bg-stone-900/60 border border-stone-800 focus:border-amber-300/40 outline-none rounded-lg pl-9 pr-3 py-2.5 text-stone-100 placeholder-stone-600 text-sm" />
        </div>
        <button onClick={() => setShowFilters(!showFilters)}
          className={`p-2.5 rounded-lg border transition-colors ${showFilters ? 'bg-amber-200 text-stone-900 border-amber-200' : 'bg-stone-900/60 border-stone-800 text-stone-400'}`}>
          <Filter size={16} />
        </button>
      </div>

      {/* Quick chips */}
      <div className="flex gap-1.5 overflow-x-auto pb-1 -mx-4 px-4 scrollbar-hide">
        {['All', 'Open', 'Closed'].map(v => <Chip key={v} active={statusFilter === v} onClick={() => setStatusFilter(v)}>{v}</Chip>)}
        <span className="border-r border-stone-800 mx-1" />
        <Chip active={sideFilter === 'Long'} onClick={() => setSideFilter(sideFilter === 'Long' ? 'All' : 'Long')} tone="profit">Long</Chip>
        <Chip active={sideFilter === 'Short'} onClick={() => setSideFilter(sideFilter === 'Short' ? 'All' : 'Short')} tone="loss">Short</Chip>
        <Chip active={resultFilter === 'Profit'} onClick={() => setResultFilter(resultFilter === 'Profit' ? 'All' : 'Profit')} tone="profit">Wins</Chip>
        <Chip active={resultFilter === 'Loss'} onClick={() => setResultFilter(resultFilter === 'Loss' ? 'All' : 'Loss')} tone="loss">Losses</Chip>
      </div>

      {showFilters && (
        <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-4 space-y-3">
          <Field label="Instrument">
            <div className="flex flex-wrap gap-1.5">
              <Chip active={instrFilter === 'All'} onClick={() => setInstrFilter('All')}>All</Chip>
              {INSTRUMENT_TYPES.map(i => <Chip key={i} active={instrFilter === i} onClick={() => setInstrFilter(i)}>{i}</Chip>)}
            </div>
          </Field>
          <Field label="Trade Type">
            <div className="flex flex-wrap gap-1.5">
              <Chip active={typeFilter === 'All'} onClick={() => setTypeFilter('All')}>All</Chip>
              {TRADE_TYPES.map(i => <Chip key={i} active={typeFilter === i} onClick={() => setTypeFilter(i)}>{i}</Chip>)}
            </div>
          </Field>
          {strategies.length > 0 && (
            <Field label="Strategy">
              <div className="flex flex-wrap gap-1.5">
                <Chip active={stratFilter === 'All'} onClick={() => setStratFilter('All')}>All</Chip>
                {strategies.map(s => <Chip key={s.id} active={stratFilter === s.id} onClick={() => setStratFilter(s.id)}>{s.name}</Chip>)}
              </div>
            </Field>
          )}
        </div>
      )}

      <p className="text-[11px] uppercase tracking-[0.2em] text-stone-500 px-1">{filtered.length} trade{filtered.length !== 1 ? 's' : ''}</p>

      <div className="space-y-2">
        {filtered.length === 0 && (
          <div className="bg-stone-900/40 border border-dashed border-stone-800 rounded-xl p-12 text-center">
            <BookOpen className="w-7 h-7 text-stone-600 mx-auto mb-3" />
            <p className="text-stone-400 text-sm">No trades match these filters</p>
            <button onClick={onAddTrade} className="text-amber-200 text-sm mt-2">Record a trade →</button>
          </div>
        )}
        {filtered.map(t => (
          <button key={t.id} onClick={() => onEdit(t)}
            className="w-full text-left bg-stone-900/40 border border-stone-800 hover:border-stone-700 rounded-xl p-4 transition-colors">
            <div className="flex items-start justify-between mb-2">
              <div className="flex items-center gap-2">
                <span className={`text-[10px] px-1.5 py-0.5 rounded ${t.side === 'Long' ? 'bg-emerald-500/15 text-emerald-300' : 'bg-rose-500/15 text-rose-300'}`}>{t.side === 'Long' ? <ArrowUpRight size={10} className="inline" /> : <ArrowDownRight size={10} className="inline" />}{t.side}</span>
                <span className="font-display text-lg text-stone-100">{t.symbol}</span>
                <span className="text-[10px] text-stone-500">{t.instrumentType}</span>
              </div>
              {t._c.isClosed ? (
                <div className="text-right">
                  <p className={`font-mono text-sm ${t._c.realizedPnL >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {t._c.realizedPnL >= 0 ? '+' : ''}{fmtMoney(t._c.realizedPnL, settings.currency)}
                  </p>
                  <p className={`font-mono text-[10px] ${t._c.realizedPnLPct >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                    {t._c.realizedPnLPct >= 0 ? '+' : ''}{fmt(t._c.realizedPnLPct)}%
                  </p>
                </div>
              ) : (
                <span className="text-[10px] text-amber-300 px-1.5 py-0.5 bg-amber-300/10 rounded">OPEN</span>
              )}
            </div>
            <div className="flex items-center justify-between text-[11px] text-stone-500 font-mono">
              <span>{fmt(t._c.totalEntryQty, 2)} @ {fmt(t._c.avgEntry)} {t._c.avgExit > 0 && `→ ${fmt(t._c.avgExit)}`}</span>
              <span>{fmtDate(t.entries?.[0]?.date)}</span>
            </div>
            <div className="flex items-center justify-between text-[10px] text-stone-600 mt-1">
              <span>{t.tradeType}{t.strategyId && ` · ${strategies.find(s => s.id === t.strategyId)?.name || ''}`}</span>
              {(t.emotions?.length > 0 || t.entryMistakes?.length > 0 || t.exitMistakes?.length > 0) &&
                <span className="text-amber-300/70">●</span>
              }
            </div>
          </button>
        ))}
      </div>
      </>
      )}
    </div>
  );
};

// ===== Contract Note / CDSL Parser =====
// Parses pasted text from Zerodha combined equity contract notes (PDF text)
// and CDSL transaction alert emails into a normalized list of executions.

const parseDate = (s) => {
  if (!s) return '';
  s = s.trim();
  // dd-MMM-yyyy or dd/MM/yyyy or yyyy-MM-dd or dd-MM-yyyy
  const months = { JAN: 0, FEB: 1, MAR: 2, APR: 3, MAY: 4, JUN: 5, JUL: 6, AUG: 7, SEP: 8, OCT: 9, NOV: 10, DEC: 11 };
  let m;
  // dd-MMM-yyyy or dd MMM yyyy
  m = s.match(/^(\d{1,2})[\-\s\/]([A-Za-z]{3})[\-\s\/](\d{2,4})$/);
  if (m) {
    let yr = parseInt(m[3], 10);
    if (yr < 100) yr += 2000;
    const mo = months[m[2].toUpperCase()];
    if (mo !== undefined) return new Date(yr, mo, parseInt(m[1], 10)).toISOString().slice(0, 16);
  }
  // dd/MM/yyyy or dd-MM-yyyy
  m = s.match(/^(\d{1,2})[\-\/](\d{1,2})[\-\/](\d{2,4})$/);
  if (m) {
    let yr = parseInt(m[3], 10);
    if (yr < 100) yr += 2000;
    return new Date(yr, parseInt(m[2], 10) - 1, parseInt(m[1], 10)).toISOString().slice(0, 16);
  }
  // yyyy-MM-dd
  m = s.match(/^(\d{4})[\-\/](\d{1,2})[\-\/](\d{1,2})$/);
  if (m) return new Date(parseInt(m[1], 10), parseInt(m[2], 10) - 1, parseInt(m[3], 10)).toISOString().slice(0, 16);
  return '';
};

// Detect format: zerodha contract note vs CDSL alert vs unknown
const detectFormat = (text) => {
  const t = text.toLowerCase();
  if (t.includes('zerodha') || t.includes('contract note') || t.includes('combined contract note')) return 'zerodha';
  if (t.includes('cdsl') || t.includes('central depository') || t.includes('transaction statement')) return 'cdsl';
  return 'unknown';
};

// Parse Zerodha combined contract note
// Layout columns include: Order Time, Order No, Trade No, Trade Time, Security Description, B/S, Quantity, Gross Rate, Brokerage, Net Rate, Closing Rate, Net Total
const parseZerodha = (text) => {
  const execs = [];
  // pull date — usually "Trade Date: 15-MAY-2024" or "Date: 15/05/2024"
  let tradeDate = '';
  const dateMatch = text.match(/(?:trade\s*date|contract\s*date|date)\s*[:\-]?\s*(\d{1,2}[\-\/\s][A-Za-z]{3}[\-\/\s]\d{2,4}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4}|\d{4}[\-\/]\d{1,2}[\-\/]\d{1,2})/i);
  if (dateMatch) tradeDate = parseDate(dateMatch[1]);
  if (!tradeDate) tradeDate = new Date().toISOString().slice(0, 16);

  // Split into lines, look for trade rows
  const lines = text.split(/\r?\n/);
  for (let raw of lines) {
    const line = raw.trim();
    if (!line) continue;

    // Skip headers/footers/totals
    if (/^(total|net|brokerage|stt|gst|stamp|sebi|exchange|turnover|grand|page)/i.test(line)) continue;
    if (line.length < 10) continue;

    // Try patterns like: SYMBOL  B  100  150.50  ... or with commas
    // Most flexible: find "B" or "S" surrounded by spaces, with a symbol before and qty/price after
    // Pattern: ([A-Z][A-Z0-9&\-\.\s]{1,20})\s+(B|S|BUY|SELL)\s+(\d+)\s+(\d+\.?\d*)
    let m = line.match(/^([A-Z][A-Z0-9&\.\-]{1,30}(?:\s+[A-Z0-9&\.\-]+)*?)\s+(B|S|BUY|SELL)\s+(\d+(?:\.\d+)?)\s+(\d+\.?\d*)/i);
    if (!m) {
      // alt: time-prefixed rows
      m = line.match(/\d{2}:\d{2}:\d{2}\s+(\S+(?:\s+\S+)*?)\s+(B|S|BUY|SELL)\s+(\d+(?:\.\d+)?)\s+(\d+\.?\d*)/i);
    }
    if (m) {
      const symbol = m[1].trim().toUpperCase().replace(/\s+/g, '');
      const sideRaw = m[2].toUpperCase();
      const side = (sideRaw === 'B' || sideRaw === 'BUY') ? 'BUY' : 'SELL';
      const qty = parseFloat(m[3]);
      const price = parseFloat(m[4]);
      if (qty > 0 && price > 0 && symbol.length >= 2 && symbol.length <= 30) {
        execs.push({ symbol, side, quantity: qty, price, date: tradeDate, source: 'zerodha' });
      }
    }
  }
  return execs;
};

// Parse CDSL transaction alert
// CDSL emails describe debits (sells) and credits (buys/IPOs) per ISIN with quantity
const parseCDSL = (text) => {
  const execs = [];
  const lines = text.split(/\r?\n/);
  let currentDate = '';

  // Extract date from header
  const dateMatch = text.match(/(?:date|on)\s*[:\-]?\s*(\d{1,2}[\-\/\s][A-Za-z]{3}[\-\/\s]\d{2,4}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/i);
  if (dateMatch) currentDate = parseDate(dateMatch[1]);
  if (!currentDate) currentDate = new Date().toISOString().slice(0, 16);

  for (let raw of lines) {
    const line = raw.trim();
    if (!line || line.length < 10) continue;

    // CDSL line might be: "INE002A01018  RELIANCE INDUSTRIES LTD  BUY  100  2450.50  15-MAY-2024"
    // Or "ISIN: INE002A01018 Qty: 100 Type: Credit/Debit"
    let m = line.match(/(INE[A-Z0-9]{9})\s+(.+?)\s+(BUY|SELL|CREDIT|DEBIT|CR|DR)\s+(\d+(?:\.\d+)?)\s+(\d+\.?\d*)/i);
    if (m) {
      const name = m[2].trim();
      // Extract symbol from name (first word usually)
      const symbol = name.split(/\s+/)[0].toUpperCase().replace(/[^A-Z0-9]/g, '');
      let side = m[3].toUpperCase();
      if (side === 'CREDIT' || side === 'CR') side = 'BUY';
      else if (side === 'DEBIT' || side === 'DR') side = 'SELL';
      const qty = parseFloat(m[4]);
      const price = parseFloat(m[5]);
      if (qty > 0 && price > 0) {
        execs.push({ symbol, side, quantity: qty, price, date: currentDate, source: 'cdsl', isin: m[1] });
      }
    }
  }
  return execs;
};

// Parse OCR-extracted text from Zerodha screenshots (Tradebook, Order book, Position book).
// OCR text is noisy — be very tolerant of extra whitespace, punctuation, and case.
const parseScreenshotText = (text) => {
  const execs = [];
  let tradeDate = '';
  // Try to find a date in the text
  const dateMatch = text.match(/(\d{1,2}[\-\/\s][A-Za-z]{3}[\-\/\s]\d{2,4}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4}|\d{4}[\-\/]\d{1,2}[\-\/]\d{1,2})/);
  if (dateMatch) tradeDate = parseDate(dateMatch[1]);
  if (!tradeDate) tradeDate = new Date().toISOString().slice(0, 16);

  const lines = text.split(/\r?\n/);
  for (let raw of lines) {
    const line = raw.trim().replace(/\s+/g, ' ');
    if (!line || line.length < 6) continue;

    // Skip likely headers/footers
    if (/^(symbol|qty|quantity|price|avg|order|status|type|product|exchange|trade\s*book|order\s*book|position|holdings|pnl|p&l|total|net|day\'?s)/i.test(line)) continue;

    // Pattern A: SYMBOL BUY/SELL QTY PRICE  (Zerodha tradebook style)
    // Tolerate trailing %, brackets, etc. Numbers may have commas like 2,450.50
    let m = line.match(/^([A-Z][A-Z0-9&\.\-]{1,20})\s+(BUY|SELL|B|S)\s+(\d+(?:\.\d+)?)\s+([\d,]+\.?\d*)/i);
    // Pattern B: SYMBOL ... B/S ... QTY ... PRICE (more flexible)
    if (!m) m = line.match(/([A-Z][A-Z0-9&\.\-]{2,20})[^\d]{1,20}(BUY|SELL|B|S)[^\d]{0,15}(\d+(?:\.\d+)?)[^\d]{1,15}([\d,]+\.?\d*)/i);

    if (m) {
      const symbol = m[1].trim().toUpperCase();
      const sideRaw = m[2].toUpperCase();
      const side = (sideRaw === 'B' || sideRaw === 'BUY') ? 'BUY' : 'SELL';
      const qty = parseFloat(m[3]);
      const price = parseFloat(m[4].replace(/,/g, ''));
      // Sanity: reject obviously wrong values (likely OCR noise)
      if (qty > 0 && qty < 1e9 && price > 0 && price < 1e9 && symbol.length >= 2) {
        execs.push({ symbol, side, quantity: qty, price, date: tradeDate, source: 'screenshot' });
      }
    }
  }
  return execs;
};

// Group same-symbol same-side executions; pair buys + sells into round-trip trades
const groupExecutions = (execs) => {
  // First group by symbol+side+date for entry/exit aggregation
  const trades = {};
  for (const e of execs) {
    const key = e.symbol;
    if (!trades[key]) trades[key] = { symbol: key, buys: [], sells: [] };
    const item = { id: uid(), price: String(e.price), quantity: String(e.quantity), date: e.date, notes: '' };
    if (e.side === 'BUY') trades[key].buys.push(item);
    else trades[key].sells.push(item);
  }
  // Convert to trade objects
  return Object.values(trades).map(t => {
    const totalBuy = t.buys.reduce((s, x) => s + parseFloat(x.quantity), 0);
    const totalSell = t.sells.reduce((s, x) => s + parseFloat(x.quantity), 0);
    const isClosed = totalBuy > 0 && totalSell >= totalBuy;
    return {
      id: uid(),
      symbol: t.symbol,
      instrumentType: 'Equity',
      tradeType: 'Swing',
      side: 'Long', // CDSL/Zerodha equity is delivery long-only (shorts wouldn't appear here)
      strategyId: '',
      status: isClosed ? 'Closed' : 'Open',
      entries: t.buys.length > 0 ? t.buys : [{ id: uid(), price: '', quantity: '', date: todayISO(), notes: '' }],
      exits: t.sells,
      stopLoss: '',
      target: '',
      emotions: [],
      generalMistakes: [],
      entryMistakes: [],
      exitMistakes: [],
      notes: 'Imported from contract note',
      createdAt: Date.now(),
      updatedAt: Date.now(),
      _imported: true
    };
  });
};

// Detect duplicates against existing trades (by symbol + date + qty + price match)
const findDuplicates = (newTrades, existing) => {
  const dupes = new Set();
  for (const nt of newTrades) {
    for (const ex of existing) {
      if (ex.symbol !== nt.symbol) continue;
      // Check if any entry matches an existing entry
      for (const ne of nt.entries) {
        for (const ee of ex.entries || []) {
          if (
            ne.date && ee.date &&
            ne.date.slice(0, 10) === ee.date.slice(0, 10) &&
            Math.abs(parseFloat(ne.price) - parseFloat(ee.price)) < 0.01 &&
            Math.abs(parseFloat(ne.quantity) - parseFloat(ee.quantity)) < 0.001
          ) {
            dupes.add(nt.id);
          }
        }
      }
    }
  }
  return dupes;
};

// ===== OCR Loader (lazy-loads Tesseract.js on first use) =====
let _tesseractPromise = null;
const loadTesseract = () => {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (_tesseractPromise) return _tesseractPromise;
  _tesseractPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js';
    s.async = true;
    s.onload = () => {
      if (window.Tesseract) resolve(window.Tesseract);
      else reject(new Error('Tesseract loaded but global is missing'));
    };
    s.onerror = () => reject(new Error('Failed to load Tesseract.js — check your connection'));
    document.head.appendChild(s);
  });
  return _tesseractPromise;
};

// ===== Import View =====
const ImportView = ({ onImport, existingTrades }) => {
  const [mode, setMode] = useState('text'); // 'text' | 'image'
  const [text, setText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [selected, setSelected] = useState(new Set());
  const [error, setError] = useState('');
  const [ocrStatus, setOcrStatus] = useState(''); // status text while OCR runs
  const [ocrProgress, setOcrProgress] = useState(0);
  const [imagePreview, setImagePreview] = useState(null);
  const fileInputRef = useRef();

  const detected = text ? detectFormat(text) : 'unknown';

  const handleParse = () => {
    setError('');
    if (!text.trim()) {
      setError('Paste contract note text or upload a screenshot first.');
      return;
    }
    let execs = [];
    if (detected === 'zerodha') execs = parseZerodha(text);
    else if (detected === 'cdsl') execs = parseCDSL(text);
    else {
      execs = [...parseZerodha(text), ...parseCDSL(text)];
    }
    // Always also try the screenshot parser as fallback
    if (execs.length === 0) execs = parseScreenshotText(text);
    if (execs.length === 0) {
      setError('No trades detected. Try editing the extracted text — symbols may have been mis-read by OCR. Each line should look like: SYMBOL BUY 100 2450.50');
      setParsed(null);
      return;
    }
    const trades = groupExecutions(execs);
    const dupes = findDuplicates(trades, existingTrades);
    setParsed({ trades, execs, dupes });
    setSelected(new Set(trades.filter(t => !dupes.has(t.id)).map(t => t.id)));
  };

  const toggleSelect = (id) => {
    const next = new Set(selected);
    if (next.has(id)) next.delete(id);
    else next.add(id);
    setSelected(next);
  };

  const selectAll = () => setSelected(new Set(parsed.trades.map(t => t.id)));
  const selectNone = () => setSelected(new Set());

  const handleImport = () => {
    const toImport = parsed.trades.filter(t => selected.has(t.id));
    if (toImport.length === 0) return;
    onImport(toImport);
    setText('');
    setParsed(null);
    setSelected(new Set());
    setImagePreview(null);
    alert(`Imported ${toImport.length} trade${toImport.length !== 1 ? 's' : ''}.`);
  };

  const handlePaste = async () => {
    try {
      const t = await navigator.clipboard.readText();
      setText(t);
    } catch {
      alert('Clipboard access denied. Please paste manually using long-press → Paste.');
    }
  };

  const handleImageUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setError('');
    setParsed(null);
    setText('');
    setOcrStatus('Loading OCR engine (first run downloads ~10MB)…');
    setOcrProgress(0);

    // Show preview
    const reader = new FileReader();
    reader.onload = ev => setImagePreview(ev.target.result);
    reader.readAsDataURL(file);

    try {
      const Tesseract = await loadTesseract();
      setOcrStatus('Reading image…');
      const result = await Tesseract.recognize(file, 'eng', {
        logger: m => {
          if (m.status === 'recognizing text') {
            setOcrProgress(Math.round(m.progress * 100));
            setOcrStatus(`Reading image… ${Math.round(m.progress * 100)}%`);
          } else if (m.status) {
            setOcrStatus(m.status.charAt(0).toUpperCase() + m.status.slice(1) + '…');
          }
        }
      });
      setOcrStatus('');
      setOcrProgress(0);
      const extracted = result.data.text || '';
      setText(extracted);
      if (!extracted.trim()) {
        setError('OCR returned no text. Try a clearer screenshot with sharper text.');
      }
    } catch (err) {
      console.error('OCR failed', err);
      setOcrStatus('');
      setOcrProgress(0);
      setError('OCR failed: ' + (err.message || String(err)) + '. Try the text paste option instead.');
    }
    // Reset file input so same file can be picked again
    if (fileInputRef.current) fileInputRef.current.value = '';
  };

  return (
    <div className="space-y-5">
      <h2 className="font-display text-2xl text-stone-100">Import Trades</h2>

      <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-4 space-y-3">
        <div className="flex items-start gap-3">
          <Mail size={18} className="text-amber-200 mt-0.5 flex-shrink-0" />
          <div className="flex-1 text-sm">
            <p className="text-stone-200 font-medium">Zerodha + CDSL Importer</p>
            <p className="text-xs text-stone-500 mt-1 leading-relaxed">
              Paste text from a <span className="text-stone-300">Zerodha contract note</span> or <span className="text-stone-300">CDSL alert</span> email,
              or upload a <span className="text-stone-300">screenshot</span> from the Zerodha app — buys and sells of the same stock are auto-paired into round-trip trades.
            </p>
          </div>
        </div>
      </div>

      {/* Mode toggle */}
      <div className="grid grid-cols-2 gap-1 bg-stone-900/40 border border-stone-800 rounded-lg p-1">
        <button onClick={() => setMode('text')} type="button"
          className={`py-2 rounded text-sm font-medium transition-colors flex items-center justify-center gap-1.5 ${mode === 'text' ? 'bg-amber-200 text-stone-900' : 'text-stone-400'}`}>
          <FileText size={14} />Paste Text
        </button>
        <button onClick={() => setMode('image')} type="button"
          className={`py-2 rounded text-sm font-medium transition-colors flex items-center justify-center gap-1.5 ${mode === 'image' ? 'bg-amber-200 text-stone-900' : 'text-stone-400'}`}>
          <Upload size={14} />Screenshot
        </button>
      </div>

      {mode === 'image' && (
        <div className="space-y-3">
          <input
            ref={fileInputRef}
            type="file"
            accept="image/*"
            capture="environment"
            onChange={handleImageUpload}
            className="hidden"
          />
          <button
            onClick={() => fileInputRef.current?.click()}
            type="button"
            disabled={!!ocrStatus}
            className="w-full bg-stone-900/40 border-2 border-dashed border-stone-700 hover:border-amber-300/40 rounded-xl p-8 flex flex-col items-center justify-center gap-2 transition-colors disabled:cursor-not-allowed disabled:opacity-60"
          >
            <Upload size={28} className="text-stone-500" />
            <p className="text-sm text-stone-300 font-medium">Choose Zerodha Screenshot</p>
            <p className="text-xs text-stone-500">Tradebook, Order book, or Position page</p>
          </button>

          {imagePreview && (
            <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-2">
              <img src={imagePreview} alt="Uploaded" className="w-full max-h-64 object-contain rounded-lg" />
            </div>
          )}

          {ocrStatus && (
            <div className="bg-amber-300/10 border border-amber-300/30 rounded-lg p-3 space-y-2">
              <p className="text-xs text-amber-200">{ocrStatus}</p>
              {ocrProgress > 0 && (
                <div className="h-1 bg-stone-900 rounded-full overflow-hidden">
                  <div className="h-full bg-amber-200 transition-all" style={{ width: `${ocrProgress}%` }} />
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {(mode === 'text' || text) && (
      <div className="space-y-2">
        <div className="flex items-center justify-between">
          <label className="text-[11px] uppercase tracking-[0.15em] text-stone-500 font-medium">
            {mode === 'image' && text ? 'Extracted text (edit if needed)' : 'Paste contract note / CDSL alert text'}
          </label>
          {mode === 'text' && (
            <button onClick={handlePaste} type="button" className="text-xs text-amber-200 flex items-center gap-1">
              <ClipboardPaste size={12} />Paste
            </button>
          )}
        </div>
        <textarea
          value={text}
          onChange={e => setText(e.target.value)}
          rows={8}
          placeholder={mode === 'image' ? 'OCR will fill this once you upload an image…' : 'Paste contract note or CDSL alert text here...'}
          className="w-full bg-stone-900/60 border border-stone-700 focus:border-amber-300/60 focus:outline-none rounded-lg px-3 py-2.5 text-stone-100 placeholder-stone-600 text-xs font-mono transition-colors resize-none"
        />
        {text && (
          <div className="flex items-center gap-2 text-xs">
            <span className="text-stone-500">Detected:</span>
            {detected === 'zerodha' && <span className="px-2 py-0.5 bg-emerald-500/15 text-emerald-300 rounded">Zerodha contract note</span>}
            {detected === 'cdsl' && <span className="px-2 py-0.5 bg-emerald-500/15 text-emerald-300 rounded">CDSL alert</span>}
            {detected === 'unknown' && <span className="px-2 py-0.5 bg-amber-500/15 text-amber-300 rounded">Generic — will try all parsers</span>}
          </div>
        )}
      </div>
      )}

      {error && (
        <div className="bg-rose-500/10 border border-rose-500/30 rounded-lg p-3 flex items-start gap-2 text-sm text-rose-300">
          <AlertCircle size={14} className="mt-0.5 flex-shrink-0" />
          <span>{error}</span>
        </div>
      )}

      {(text || mode === 'text') && (
        <Btn onClick={handleParse} disabled={!text.trim() || !!ocrStatus} className="w-full">
          <FileText size={14} className="inline mr-1.5" />Parse trades
        </Btn>
      )}

      {parsed && parsed.trades.length > 0 && (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <p className="text-[11px] uppercase tracking-[0.2em] text-stone-500">
              Found {parsed.trades.length} · {selected.size} selected
            </p>
            <div className="flex gap-2 text-xs">
              <button onClick={selectAll} className="text-amber-200">All</button>
              <span className="text-stone-700">·</span>
              <button onClick={selectNone} className="text-stone-400">None</button>
            </div>
          </div>

          <div className="space-y-2">
            {parsed.trades.map(t => {
              const isDupe = parsed.dupes.has(t.id);
              const isSel = selected.has(t.id);
              const totalBuy = t.entries.reduce((s, e) => s + parseFloat(e.quantity || 0), 0);
              const totalSell = t.exits.reduce((s, e) => s + parseFloat(e.quantity || 0), 0);
              const avgBuy = totalBuy > 0 ? t.entries.reduce((s, e) => s + parseFloat(e.price || 0) * parseFloat(e.quantity || 0), 0) / totalBuy : 0;
              const avgSell = totalSell > 0 ? t.exits.reduce((s, e) => s + parseFloat(e.price || 0) * parseFloat(e.quantity || 0), 0) / totalSell : 0;
              return (
                <button
                  key={t.id}
                  onClick={() => toggleSelect(t.id)}
                  type="button"
                  className={`w-full text-left rounded-xl p-3 border transition-colors ${
                    isSel
                      ? 'bg-amber-200/5 border-amber-200/40'
                      : 'bg-stone-900/40 border-stone-800 hover:border-stone-700'
                  }`}
                >
                  <div className="flex items-start gap-3">
                    <div className={`w-5 h-5 rounded mt-0.5 border flex items-center justify-center flex-shrink-0 ${isSel ? 'bg-amber-200 border-amber-200' : 'border-stone-600'}`}>
                      {isSel && <Check size={12} className="text-stone-900" strokeWidth={3} />}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-display text-base text-stone-100">{t.symbol}</span>
                        {t.status === 'Closed' ? (
                          <span className="text-[10px] px-1.5 py-0.5 bg-stone-800 text-stone-400 rounded">CLOSED</span>
                        ) : (
                          <span className="text-[10px] px-1.5 py-0.5 bg-amber-300/10 text-amber-300 rounded">OPEN</span>
                        )}
                        {isDupe && (
                          <span className="text-[10px] px-1.5 py-0.5 bg-rose-500/15 text-rose-300 rounded">DUPLICATE</span>
                        )}
                      </div>
                      <div className="text-[11px] text-stone-500 font-mono mt-1 space-y-0.5">
                        {t.entries.length > 0 && totalBuy > 0 && (
                          <div>Buy: {fmt(totalBuy, 0)} @ ₹{fmt(avgBuy)}</div>
                        )}
                        {t.exits.length > 0 && totalSell > 0 && (
                          <div>Sell: {fmt(totalSell, 0)} @ ₹{fmt(avgSell)}</div>
                        )}
                        <div className="text-stone-600 text-[10px]">
                          {t.entries.length} buy{t.entries.length !== 1 ? 's' : ''} · {t.exits.length} sell{t.exits.length !== 1 ? 's' : ''}
                        </div>
                      </div>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>

          <Btn onClick={handleImport} disabled={selected.size === 0} className="w-full">
            Import {selected.size} trade{selected.size !== 1 ? 's' : ''}
          </Btn>
        </div>
      )}

      <div className="bg-stone-900/40 border border-stone-800 rounded-xl p-4 space-y-2 text-xs text-stone-400">
        <p className="text-[11px] uppercase tracking-[0.2em] text-stone-500">Tips</p>
        <p>• <span className="text-stone-300">Paste Text:</span> Open Zerodha's daily contract note PDF or CDSL email, select all and paste here.</p>
        <p>• <span className="text-stone-300">Screenshot:</span> Upload a clear screenshot of the Zerodha tradebook / order book. First OCR run downloads ~10MB; subsequent runs are instant.</p>
        <p>• OCR works best on sharp screenshots — zoom in on the trade rows for better accuracy. You can edit the extracted text before parsing if anything looks wrong.</p>
        <p>• Already-imported trades are auto-detected as duplicates so you can skip them.</p>
      </div>
    </div>
  );
};

    <div className="min-h-screen bg-stone-950 text-stone-100 font-body relative">

      {/* Header */}
      <header className="sticky top-0 z-30 backdrop-blur-md bg-stone-950/80 border-b border-stone-900" style={{ paddingTop: 'env(safe-area-inset-top, 0px)' }}>
        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-md bg-gradient-to-br from-amber-200 to-amber-400 flex items-center justify-center">
              <span className="font-display text-stone-900 font-bold text-sm">N</span>
            </div>
            <h1 className="font-display text-lg tracking-tight">Nazeer <span className="text-stone-600 text-xs uppercase tracking-[0.2em] ml-1">Trades</span></h1>
          </div>
          <p className="text-[11px] text-stone-500 font-mono">{new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</p>
        </div>
      </header>

      {/* Content */}
      <main className="max-w-2xl mx-auto px-4 py-5 relative">
        {tab === 'home' && (
          <Dashboard
            trades={trades} settings={settings} strategies={strategies}
            onAddTrade={() => setTradeModal({ open: true, initial: null })}
            onOpenSettings={() => setTab('more')}
          />
        )}
        {tab === 'trades' && (
          <TradesView
            trades={trades} strategies={strategies} settings={settings}
            onEdit={(t) => setTradeModal({ open: true, initial: t })}
            onAddTrade={() => setTradeModal({ open: true, initial: null })}
          />
        )}
        {tab === 'watch' && (
          <WatchlistView
            watchlist={watchlist} settings={settings}
            onEdit={(w) => setWatchModal({ open: true, initial: w })}
            onAdd={() => setWatchModal({ open: true, initial: null })}
          />
        )}
        {tab === 'strat' && (
          <StrategiesView
            strategies={strategies} trades={trades} settings={settings}
            onAdd={() => setStratModal({ open: true, initial: null })}
            onEdit={(s) => setStratModal({ open: true, initial: s })}
          />
        )}
        {tab === 'more' && (
          <MoreView
            settings={settings} trades={trades} strategies={strategies} watchlist={watchlist}
            update={update} replaceAll={replaceAll} onImport={bulkImportTrades}
          />
        )}
      </main>

      {/* FAB */}
      {showFab && (
        <button
          onClick={() => setTradeModal({ open: true, initial: null })}
          className="fixed right-5 bottom-24 z-20 w-14 h-14 rounded-full bg-amber-200 text-stone-900 shadow-2xl shadow-amber-200/20 flex items-center justify-center hover:scale-105 transition-transform">
          <Plus size={24} strokeWidth={2.5} />
        </button>
      )}

      {/* Bottom Nav */}
      <nav className="fixed bottom-0 left-0 right-0 z-20 backdrop-blur-md bg-stone-950/90 border-t border-stone-900">
        <div className="max-w-2xl mx-auto grid grid-cols-5">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex flex-col items-center gap-0.5 py-3 transition-colors ${tab === t.id ? 'text-amber-200' : 'text-stone-500'}`}>
              <t.icon size={18} strokeWidth={tab === t.id ? 2.2 : 1.8} />
              <span className="text-[10px] uppercase tracking-wider">{t.label}</span>
              {tab === t.id && <div className="w-1 h-1 rounded-full bg-amber-200 absolute top-1.5" />}
            </button>
          ))}
        </div>
        <div className="h-safe" style={{ height: 'env(safe-area-inset-bottom)' }} />
      </nav>

      {/* Modals */}
      <TradeModal
        open={tradeModal.open}
        onClose={() => setTradeModal({ open: false, initial: null })}
        onSave={saveTrade} onDelete={deleteTrade}
        initial={tradeModal.initial} strategies={strategies}
      />
      <WatchlistModal
        open={watchModal.open}
        onClose={() => setWatchModal({ open: false, initial: null })}
        onSave={saveWatch} onDelete={deleteWatch}
        initial={watchModal.initial}
      />
      <StrategyModal
        open={stratModal.open}
        onClose={() => setStratModal({ open: false, initial: null })}
        onSave={saveStrategy} onDelete={deleteStrategy}
        initial={stratModal.initial}
      />
    </div>
  );
}

// ===== Mount =====
try {
  const rootEl = document.getElementById('root');
  if (!rootEl) throw new Error('Root element not found');
  const root = createRoot(rootEl);
  root.render(<App />);
} catch (err) {
  console.error('Mount failed:', err);
  if (typeof window.showBootError === 'function') {
    window.showBootError('Failed to render app', (err && err.stack) || String(err));
  }
}

  </script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
